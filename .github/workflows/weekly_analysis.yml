name: Weekly Vault Analysis

on:
  schedule:
    # Every Sunday at 08:00 UTC
    - cron: "0 8 * * 0"
  workflow_dispatch:
    inputs:
      vault_url:
        description: "Override vault git URL (leave blank to use default)"
        required: false
        default: ""
      snapshot_date:
        description: "Override snapshot date (YYYY-MM-DD, leave blank for today)"
        required: false
        default: ""

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push snapshots back to this repo

    steps:
      - name: Check out knowledge-gardener
        uses: actions/checkout@v4
        with:
          # Fetch full history so git commit works
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install knowledge-gardener
        run: pip install -e ".[dev,llm]"

      - name: Clone / pull vault
        env:
          # Set VAULT_TOKEN to a PAT with read access to the vault repo.
          # GITHUB_TOKEN is used as a fallback (works if vault is public or
          # if the Actions token is granted cross-repo access).
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          VAULT_URL="${{ github.event.inputs.vault_url }}"
          if [ -z "$VAULT_URL" ]; then
            VAULT_URL="https://github.com/kiyotaka2334/obsidian-vault.git"
          fi
          # Inject credentials via git URL rewriting (keeps the clone URL clean)
          TOKEN="${VAULT_TOKEN:-$GH_TOKEN}"
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
          if [ -d vault/.git ]; then
            git -C vault pull
          else
            git clone "$VAULT_URL" vault
          fi

      - name: Restore snapshots cache
        uses: actions/cache@v4
        with:
          path: snapshots/
          key: snapshots-${{ github.run_id }}
          restore-keys: |
            snapshots-

      - name: Run weekly analysis
        env:
          # Optional: set GEMINI_API_KEY secret to enable LLM-powered insights.
          # If absent, the workflow runs as before with statistical reports only.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          EXTRA_ARGS=""
          if [ -n "${{ github.event.inputs.snapshot_date }}" ]; then
            EXTRA_ARGS="--snapshot-date ${{ github.event.inputs.snapshot_date }}"
          fi
          python scripts/weekly_run.py \
            --vault vault \
            --snapshots-dir snapshots \
            --no-pull \
            $EXTRA_ARGS

      - name: Commit and push snapshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore: weekly snapshot $DATE [skip ci]"
            git push
          fi

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-reports-${{ github.run_number }}
          path: |
            snapshots/**/report.md
            snapshots/**/weekly_diff.md
          retention-days: 90
